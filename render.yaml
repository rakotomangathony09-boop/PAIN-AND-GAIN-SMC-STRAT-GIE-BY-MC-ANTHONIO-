services:
  - type: web
    name: vvip-signal-pro-mcanthonio
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: "npm install"
    startCommand: "node index.js"
    envVars:
      - key: NODE_VERSION
        value: 20.2.0
      - key: BOT_TOKEN
        sync: false
      - key: CHAT_ID
        sync: false
      - key: PUPPETEER_SKIP_DOWNLOAD
        value: "true"
